# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # 即使 genSources 不产出源码，我们也要跑一遍以获取缓存
      - name: 生成 Minecraft 源码（获取缓存）
        run: ./gradlew genSources --no-daemon

      # ========== 直接用 CFR 反编译 minecraft-merged.jar ==========
      - name: 反编译 Minecraft 字节码（CFR）
        id: decompile
        run: |
          mkdir -p build/artifacts

          # 1. 定位 minecraft-merged.jar（这是原版完整字节码）
          MERGED_JAR=$(find ~/.gradle/caches -type f -name "minecraft-merged.jar" 2>/dev/null | head -1)
          if [ -z "$MERGED_JAR" ] || [ ! -f "$MERGED_JAR" ]; then
            echo "❌ 未找到 minecraft-merged.jar，跳过反编译"
            echo "found_java=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "✅ 找到 minecraft-merged.jar: $MERGED_JAR"

          # 2. 下载 CFR 反编译器
          CFR_JAR="build/cfr.jar"
          if [ ! -f "$CFR_JAR" ]; then
            echo "📥 正在下载 CFR 反编译器..."
            wget -q -O "$CFR_JAR" "https://repo1.maven.org/maven2/org/benf/cfr/0.152/cfr-0.152.jar"
          fi

          # 3. 执行反编译（输出到 build/artifacts/mc_src）
          echo "🔧 开始反编译 minecraft-merged.jar ..."
          java -jar "$CFR_JAR" "$MERGED_JAR" --outputdir build/artifacts/mc_src

          # 4. 验证反编译结果
          JAVA_COUNT=$(find build/artifacts/mc_src -name "*.java" 2>/dev/null | wc -l)
          if [ "$JAVA_COUNT" -gt 0 ]; then
            echo "🎉 反编译成功！生成 $JAVA_COUNT 个 Java 文件"
            echo "found_java=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 反编译未产生任何 Java 文件"
            echo "found_java=false" >> $GITHUB_OUTPUT
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传反编译后的源码 ==========
      - name: 上传 Minecraft 源码（反编译）
        if: steps.decompile.outputs.found_java == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources
          path: build/artifacts/mc_src
          if-no-files-found: ignore
