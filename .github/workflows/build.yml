# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ============================================================
      # 强制 Loom 生成未混淆源码（以 MinecraftClient.java 为锚点）
      # ============================================================
      - name: 强制反编译并提取未混淆源码
        id: gen_unmapped
        run: |
          # 1. 清除所有可能的输出目录（确保重新生成）
          rm -rf build/tmp/genSources build/genSources build/unpacked

          # 2. 强制重跑反编译任务
          ./gradlew genSources --rerun-tasks --no-daemon

          # 3. 搜索目标文件：net/minecraft/client/MinecraftClient.java
          TARGET_FILE="net/minecraft/client/MinecraftClient.java"
          mkdir -p build/artifacts
          FOUND=false

          # 3a. 在 build/ 下搜索
          echo "🔍 在 build/ 下搜索 $TARGET_FILE ..."
          SRC_DIR=$(find build -type f -name "MinecraftClient.java" -path "*/net/minecraft/client/MinecraftClient.java" 2>/dev/null | head -1 | xargs -n1 dirname | head -1)
          if [ -n "$SRC_DIR" ] && [ -f "$SRC_DIR/$TARGET_FILE" ]; then
            echo "✅ 在 build 下找到: $SRC_DIR"
            cp -r "$SRC_DIR" build/artifacts/mc_src
            FOUND=true
          fi

          # 3b. 如果没找到，在 Gradle 缓存中搜索
          if [ "$FOUND" = false ]; then
            echo "🔍 在 ~/.gradle/caches/ 下搜索 $TARGET_FILE ..."
            SRC_DIR=$(find ~/.gradle/caches -type f -name "MinecraftClient.java" -path "*/net/minecraft/client/MinecraftClient.java" 2>/dev/null | head -1 | xargs -n1 dirname | head -1)
            if [ -n "$SRC_DIR" ] && [ -f "$SRC_DIR/$TARGET_FILE" ]; then
              echo "✅ 在缓存中找到: $SRC_DIR"
              cp -r "$SRC_DIR" build/artifacts/mc_src
              FOUND=true
            fi
          fi

          # 3c. 如果还找不到，暴力搜索整个工作目录
          if [ "$FOUND" = false ]; then
            echo "🔍 全局搜索 $TARGET_FILE（可能耗时）..."
            SRC_DIR=$(find . -type f -name "MinecraftClient.java" -path "*/net/minecraft/client/MinecraftClient.java" 2>/dev/null | head -1 | xargs -n1 dirname | head -1)
            if [ -n "$SRC_DIR" ] && [ -f "$SRC_DIR/$TARGET_FILE" ]; then
              echo "✅ 全局搜索找到: $SRC_DIR"
              cp -r "$SRC_DIR" build/artifacts/mc_src
              FOUND=true
            fi
          fi

          # 4. 如果找到了，统计并标记
          if [ "$FOUND" = true ]; then
            JAVA_COUNT=$(find build/artifacts/mc_src -name "*.java" 2>/dev/null | wc -l)
            echo "🎉 成功获取未混淆源码！Java 文件数: $JAVA_COUNT"
            echo "found_java=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 所有方法均失败，未找到 $TARGET_FILE"
            # 打印一些可能的 Java 文件路径（前 20 个）用于调试
            echo "📂 以下是一些包含 MinecraftClient 的文件（如果有）："
            find . -name "MinecraftClient.java" 2>/dev/null | head -20 || echo "没有找到任何 MinecraftClient.java"
            echo "found_java=false" >> $GITHUB_OUTPUT
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传未混淆源码（如果找到） ==========
      - name: 上传未混淆源码（Yarn 映射后）
        if: steps.gen_unmapped.outputs.found_java == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-unobfuscated
          path: build/artifacts/mc_src
          if-no-files-found: ignore
