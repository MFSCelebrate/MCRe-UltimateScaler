# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 生成 Minecraft 源码
        run: ./gradlew genSources --no-daemon

      # ========== 收集 Loom 反编译源码（健壮版） ==========
      - name: 收集 Loom 反编译源码
        id: collect_sources
        run: |
          mkdir -p build/artifacts
          FOUND=false

          # 1. 尝试多个可能的源码输出目录
          CANDIDATE_DIRS=(
            "build/tmp/genSources"
            "build/genSources"
            "build/generated/sources"
            "build/.gen"
            "build/unpacked"
          )

          for dir in "${CANDIDATE_DIRS[@]}"; do
            if [ -d "$dir" ] && [ -d "$dir/net/minecraft" ]; then
              echo "✅ 找到反编译源码目录: $dir"
              cp -r "$dir" build/artifacts/mc_src
              FOUND=true
              break
            fi
          done

          # 2. 如果还没找到，全盘搜索 build/ 下可能包含 net/minecraft 的目录
          if [ "$FOUND" = false ]; then
            echo "⚠️ 未在常见目录找到，尝试全盘搜索..."
            SRC_DIR=$(find build -type d -path "*/net/minecraft" 2>/dev/null | head -1)
            if [ -n "$SRC_DIR" ] && [ -d "$SRC_DIR" ]; then
              PARENT_DIR=$(dirname "$SRC_DIR")
              echo "✅ 通过搜索找到源码目录: $PARENT_DIR"
              cp -r "$PARENT_DIR" build/artifacts/mc_src
              FOUND=true
            fi
          fi

          # 3. 如果找到了，统计并标记成功
          if [ "$FOUND" = true ]; then
            JAVA_COUNT=$(find build/artifacts/mc_src -name "*.java" | wc -l)
            echo "🎉 成功获取 Java 源码！文件数: $JAVA_COUNT"
            echo "::set-output name=found_java::true"
          else
            echo "❌ 未找到 Loom 反编译源码目录，尝试从缓存提取 merged-unpicked.jar（字节码）..."
            SOURCE_JAR=$(find ~/.gradle/caches -type f -name "merged-unpicked.jar" 2>/dev/null | head -1)
            if [ -n "$SOURCE_JAR" ] && [ -f "$SOURCE_JAR" ] && [ -s "$SOURCE_JAR" ]; then
              mkdir -p build/artifacts/mc_src
              unzip -q "$SOURCE_JAR" -d build/artifacts/mc_src 2>/dev/null || echo "解压失败，跳过字节码"
              echo "📦 已尝试解压 merged-unpicked.jar（可能包含 .class 文件）"
              echo "::set-output name=found_java::false"
            else
              echo "⚠️ merged-unpicked.jar 不存在或为空，跳过源码提取"
              echo "::set-output name=found_java::false"
            fi
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传源码（如果有） ==========
      - name: 上传 Minecraft 源码
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources
          path: build/artifacts/mc_src
          if-no-files-found: ignore   # 没有也不报错
