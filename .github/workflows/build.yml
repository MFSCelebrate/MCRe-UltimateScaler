# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 生成 Minecraft 源码
        run: ./gradlew genSources

      # ============================================================
      # 核心改动：把能找到的 jar 全部捞出来，打包上传
      # ============================================================
      - name: 收集并解压 Minecraft 相关 jar
        run: |
          set -e
          mkdir -p build/all_jars build/mc_src

          # 1. 先把 fabric-loom 目录下所有 jar 都拷贝出来（一个不漏）
          echo "📦 正在复制 fabric-loom 缓存中的所有 jar..."
          find ~/.gradle/caches/fabric-loom -type f -name "*.jar" -exec cp {} build/all_jars/ \;
          echo "✅ 已复制 $(ls -1 build/all_jars/ | wc -l) 个 jar 文件"

          # 2. 专门寻找真正的源码 jar（merged-unpicked.jar）
          SOURCE_JAR=$(find ~/.gradle/caches -type f -name "merged-unpicked.jar" | head -1)
          
          if [ -z "$SOURCE_JAR" ]; then
            # 如果没找到 merged-unpicked，退而求其次找 minecraft-merged.jar
            SOURCE_JAR=$(find ~/.gradle/caches -type f -name "minecraft-merged.jar" | head -1)
          fi

          if [ -n "$SOURCE_JAR" ] && [ -f "$SOURCE_JAR" ]; then
            echo "✅ 找到源码 jar: $SOURCE_JAR"
            # 把源码 jar 单独复制一份，方便识别
            cp "$SOURCE_JAR" build/all_jars/MC-SOURCE-merged-unpicked.jar
            # 尝试解压到 mc_src
            unzip -q "$SOURCE_JAR" -d build/mc_src
            if [ -d "build/mc_src/net/minecraft" ]; then
              echo "✅ 源码解压成功，net/minecraft 目录已就绪"
            else
              echo "⚠️ 解压后未找到 net/minecraft，可能不是完整源码包"
            fi
          else
            echo "⚠️ 未找到明确的源码 jar，但所有缓存 jar 已打包在 all_jars 中"
          fi

          # 3. 列出 all_jars 内容，方便排查
          echo "📂 all_jars 目录内容："
          ls -lh build/all_jars/

      - name: 执行模组构建（不包含 Minecraft 类）
        run: ./gradlew build --no-daemon

      # ========== 上传产物 1：模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传产物 2：所有 Minecraft 缓存 jar（备用大礼包） ==========
      - name: 上传 Minecraft 缓存 JAR 包（全量）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-cache-all-jars
          path: build/all_jars/*.jar
          if-no-files-found: ignore

      # ========== 上传产物 3：已解压的源码目录（如果成功） ==========
      - name: 上传 Minecraft 源码（已解压，即开即看）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-${{ env.MC_VERSION }}
          path: build/mc_src
          if-no-files-found: ignore
