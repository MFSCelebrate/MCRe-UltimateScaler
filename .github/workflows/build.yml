# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ============================================================
      # 核心：只获取 merged-unpicked.jar（不需要反编译）
      # ============================================================
      - name: 提取 merged-unpicked.jar（Yarn 映射字节码）
        id: extract
        run: |
          mkdir -p build/artifacts

          # 1. 触发 Loom 下载依赖（但不执行反编译）
          # 用 'tasks' 或 'build' 都能让 Loom 在配置阶段下载中间产物
          ./gradlew tasks --no-daemon

          # 2. 从缓存中定位 merged-unpicked.jar（确保文件存在且非空）
          UNPICKED_JAR=$(find ~/.gradle/caches -name "merged-unpicked.jar" -size +1M 2>/dev/null | head -1)
          if [ -n "$UNPICKED_JAR" ] && [ -f "$UNPICKED_JAR" ]; then
            cp "$UNPICKED_JAR" build/artifacts/merged-unpicked.jar
            echo "✅ 已提取 merged-unpicked.jar (大小: $(du -h build/artifacts/merged-unpicked.jar | cut -f1))"
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 未找到有效的 merged-unpicked.jar，尝试直接运行 gradle build 来生成缓存..."
            # 如果第一次找不到，跑一次 build 确保缓存生成
            ./gradlew build --no-daemon
            UNPICKED_JAR=$(find ~/.gradle/caches -name "merged-unpicked.jar" -size +1M 2>/dev/null | head -1)
            if [ -n "$UNPICKED_JAR" ] && [ -f "$UNPICKED_JAR" ]; then
              cp "$UNPICKED_JAR" build/artifacts/merged-unpicked.jar
              echo "✅ 第二次尝试成功，已提取 merged-unpicked.jar"
              echo "found=true" >> $GITHUB_OUTPUT
            else
              echo "❌ 无法找到 merged-unpicked.jar"
              echo "found=false" >> $GITHUB_OUTPUT
            fi
          fi

          # 3. 打印缓存目录结构以便调试（如果失败）
          if [ "$found" != "true" ]; then
            echo "📂 缓存目录内容（前 20 个 jar）："
            find ~/.gradle/caches -name "*.jar" 2>/dev/null | head -20
          fi

      # ============================================================
      # 执行模组构建（原构建流程）
      # ============================================================
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ============================================================
      # 上传产物
      # ============================================================
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: 上传 merged-unpicked.jar（Yarn 映射字节码）
        if: steps.extract.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-merged-unpicked
          path: build/artifacts/merged-unpicked.jar
          if-no-files-found: ignore
