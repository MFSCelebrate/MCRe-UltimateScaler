# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ============================================================
      # 触发 Loom 下载所有缓存
      # ============================================================
      - name: 执行 Gradle 构建（下载所有依赖和缓存）
        run: ./gradlew build --no-daemon

      # ============================================================
      # 激进：打包 /home/runner 下所有 jar（含 merged-unpicked.jar）
      # ============================================================
      - name: 收集并打包所有 jar
        id: collect_jars
        run: |
          mkdir -p build/all_jars

          # 激进！整个 /home/runner 下所有 jar 都复制过来
          # 排除 Gradle wrapper 目录（避免重复）
          find /home/runner -name "*.jar" -not -path "*/wrapper/*" -exec cp {} build/all_jars/ \;

          echo "📊 共收集 $(ls -1 build/all_jars/ | wc -l) 个 jar 文件"
          echo "📂 前 20 个文件："
          ls -lh build/all_jars/ | head -20

          # 检查 merged-unpicked.jar 是否在其中
          if ls build/all_jars/ | grep -q "merged-unpicked"; then
            echo "🎉 merged-unpicked.jar 已收集！"
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 未找到 merged-unpicked.jar"
            echo "found=false" >> $GITHUB_OUTPUT
          fi

          # 生成文件列表，方便查看
          ls -la build/all_jars/ > build/all_jars/filelist.txt

      # ============================================================
      # 上传模组 Jar
      # ============================================================
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ============================================================
      # 上传所有 jar（大礼包，含 merged-unpicked.jar）
      # ============================================================
      - name: 上传所有 jar（大礼包）
        uses: actions/upload-artifact@v4
        with:
          name: all-jars-collection
          path: build/all_jars/*.jar
          if-no-files-found: ignore

      # ============================================================
      # 额外上传文件列表，方便查看
      # ============================================================
      - name: 上传文件列表
        uses: actions/upload-artifact@v4
        with:
          name: jar-filelist
          path: build/all_jars/filelist.txt
          if-no-files-found: ignore
