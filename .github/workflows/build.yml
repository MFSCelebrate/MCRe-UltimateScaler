# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ============================================================
      # 核心：强制 Loom 重新生成未混淆的源码
      # ============================================================
      - name: 强制生成未混淆源码（Yarn 映射）
        id: gen_unmapped
        run: |
          # 1. 删除旧的 genSources 输出，强制 Gradle 重新执行
          rm -rf build/tmp/genSources
          
          # 2. 运行 genSources，强制重跑所有相关任务
          ./gradlew genSources --rerun-tasks --no-daemon

          # 3. 检查是否生成未混淆源码
          mkdir -p build/artifacts
          if [ -d "build/tmp/genSources" ] && [ -d "build/tmp/genSources/net/minecraft" ]; then
            # 检查是否有 .java 文件
            JAVA_COUNT=$(find build/tmp/genSources -name "*.java" | wc -l)
            if [ "$JAVA_COUNT" -gt 0 ]; then
              echo "✅ 成功生成未混淆源码，Java 文件数: $JAVA_COUNT"
              cp -r build/tmp/genSources build/artifacts/mc_src
              echo "found_java=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ 目录存在，但未找到 .java 文件"
              echo "found_java=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ 未找到 build/tmp/genSources/net/minecraft，生成失败"
            # 打印 build/ 目录结构用于调试
            find build -maxdepth 3 -type d
            echo "found_java=false" >> $GITHUB_OUTPUT
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传未混淆源码（如果成功） ==========
      - name: 上传未混淆源码（Yarn 映射后）
        if: steps.gen_unmapped.outputs.found_java == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-unobfuscated
          path: build/artifacts/mc_src
          if-no-files-found: ignore
