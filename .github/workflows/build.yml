# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ============================================================
      # 触发 Loom 下载所有缓存（不反编译）
      # ============================================================
      - name: 执行 Gradle 构建（下载依赖和缓存）
        run: ./gradlew build

      # ============================================================
      # 生成所有 jar 的完整路径列表（不复制文件）
      # ============================================================
      - name: 生成 jar 路径列表
        run: |
          mkdir -p build/artifacts
          find /home/runner -name "*.jar" -not -path "*/wrapper/*" > build/artifacts/jar-paths.txt
          echo "📊 共找到 $(wc -l < build/artifacts/jar-paths.txt) 个 jar 文件"
          echo "📂 包含 merged-unpicked 的行："
          grep -i "merged-unpicked" build/artifacts/jar-paths.txt || echo "未找到 merged-unpicked"

      # ============================================================
      # 上传模组 Jar（原构建产物）
      # ============================================================
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ============================================================
      # 上传路径列表（轻量级 artifact）
      # ============================================================
      - name: 上传 jar 路径列表
        uses: actions/upload-artifact@v4
        with:
          name: jar-paths-list
          path: build/artifacts/jar-paths.txt
          if-no-files-found: ignore
