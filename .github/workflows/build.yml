# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ============================================================
      # 强制生成未混淆源码到 build/genSources
      # ============================================================
      - name: 生成未混淆源码
        id: gen_sources
        run: |
          # 删除可能存在的旧目录，确保重新生成
          rm -rf build/genSources
          # 执行 genSources，--rerun-tasks 保证重新反编译
          ./gradlew genSources --rerun-tasks --no-daemon

          # 检查目标文件是否存在
          if [ -f "build/genSources/net/minecraft/client/MinecraftClient.java" ]; then
            echo "✅ 成功生成未混淆源码（MinecraftClient.java 存在）"
            echo "found_java=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到 MinecraftClient.java，生成失败"
            # 打印 build/genSources 目录结构以协助调试
            find build/genSources -type f -name "*.java" 2>/dev/null | head -10 || echo "目录为空或不存在"
            echo "found_java=false" >> $GITHUB_OUTPUT
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传未混淆源码（如果生成成功） ==========
      - name: 上传未混淆源码（Yarn 映射后）
        if: steps.gen_sources.outputs.found_java == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-unobfuscated
          path: build/genSources
          if-no-files-found: ignore
