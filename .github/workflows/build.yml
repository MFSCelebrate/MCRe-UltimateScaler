# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        java: [21]
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ matrix.java }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ========== 核心改动：生成并解压 Minecraft 1.21.8 源码 ==========
      - name: 生成并解压 Minecraft 源码
        run: |
          ./gradlew genSources
          SOURCE_JAR=$(find ~/.gradle/caches -name "minecraft-1.21.8-*-sources.jar" | head -n 1)
          if [ -f "$SOURCE_JAR" ]; then
            mkdir -p build/mc_src
            unzip -q "$SOURCE_JAR" -d build/mc_src
            echo "✅ 源码已解压到 build/mc_src，包含 net/minecraft 目录"
          else
            echo "⚠️ 未找到源码 jar，跳过解压"
          fi

      - name: 执行模组构建（不包含 Minecraft 类）
        run: ./gradlew build --no-daemon

      # ========== 上传产物 1：模组 Jar（干净） ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传产物 2：已解压的 Minecraft 源码（即开即看） ==========
      - name: 上传 Minecraft 源码（已解压，可直接浏览）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-1.21.8
          path: build/mc_src
          if-no-files-found: warn
