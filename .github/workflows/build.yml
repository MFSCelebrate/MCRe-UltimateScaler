# .github/workflows/build.yml
# Ultimate Scaler CI 构建流水线（稳定版，直接提供 bytecode）
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 生成 Minecraft 源码（获取缓存 jar）
        run: ./gradlew genSources

      # ============================================================
      # 直接从缓存复制 Minecraft 核心 jar，不做反编译
      # ============================================================
      - name: 收集 Minecraft 字节码包
        run: |
          set -e
          MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          echo "📌 Minecraft 版本: $MC_VERSION"

          mkdir -p build/mc_src build/all_jars

          # 1. 定位主游戏 jar（minecraft-merged.jar）
          MERGED_JAR=$(find ~/.gradle/caches -type f -name "minecraft-merged.jar" | head -1)
          if [ -n "$MERGED_JAR" ] && [ -f "$MERGED_JAR" ]; then
            echo "✅ 找到主游戏包: $MERGED_JAR"
            cp "$MERGED_JAR" build/all_jars/minecraft-merged.jar
            # 解压到 mc_src（里面全是 .class，用于上传）
            unzip -q "$MERGED_JAR" -d build/mc_src
            echo "📊 解压完成，总文件数: $(find build/mc_src -type f | wc -l)"
          else
            echo "⚠️ 未找到 minecraft-merged.jar"
          fi

          # 2. 额外备份 client jar（可选）
          CLIENT_JAR=$(find ~/.gradle/caches -type f -name "minecraft-client.jar" | head -1)
          if [ -n "$CLIENT_JAR" ] && [ -f "$CLIENT_JAR" ]; then
            cp "$CLIENT_JAR" build/all_jars/minecraft-client.jar
          fi

          # 3. 列出 all_jars 内容
          echo "📂 all_jars 目录内容："
          ls -lh build/all_jars/

      # 执行模组构建
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传产物 1：模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传产物 2：Minecraft 字节码（解压后，.class 文件） ==========
      - name: 上传 Minecraft 字节码（解压后，可用 MT 管理器转 Java）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-bytecode-${{ env.MC_VERSION }}
          path: build/mc_src
          if-no-files-found: ignore

      # ========== 上传产物 3：原始 jar 备用 ==========
      - name: 上传 Minecraft 缓存 JAR 包（原始）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-cache-all-jars
          path: build/all_jars/*.jar
          if-no-files-found: ignore
