name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 生成 Minecraft 源码
        run: ./gradlew genSources --no-daemon

      # ============================================================
      # 通过 MinecraftClient.class 定位映射后的源码目录
      # ============================================================
      - name: 定位并上传映射后的源码
        id: locate_sources
        run: |
          mkdir -p build/artifacts

          # 1. 在缓存中搜索 MinecraftClient.class（混淆名 class_310，但映射后是 MinecraftClient）
          CLASS_FILE=$(find ~/.gradle/caches -type f -name "MinecraftClient.class" 2>/dev/null | head -1)

          if [ -z "$CLASS_FILE" ]; then
            # 如果没找到映射后的类名，尝试搜索混淆名 class_310.class
            CLASS_FILE=$(find ~/.gradle/caches -type f -name "class_310.class" 2>/dev/null | head -1)
          fi

          if [ -n "$CLASS_FILE" ] && [ -f "$CLASS_FILE" ]; then
            echo "✅ 找到 MinecraftClient.class: $CLASS_FILE"
            # 定位到 net/minecraft/client 目录的父目录（即包含整个 net/ 的根）
            SRC_ROOT=$(echo "$CLASS_FILE" | sed -n 's|\(.*/net/minecraft/client/\)MinecraftClient.class|\1|p' | head -1)
            if [ -z "$SRC_ROOT" ]; then
              # 如果是 class_310.class，同样处理
              SRC_ROOT=$(echo "$CLASS_FILE" | sed -n 's|\(.*/net/minecraft/client/\)class_310.class|\1|p' | head -1)
            fi

            if [ -n "$SRC_ROOT" ]; then
              # 往上退两层到 net 的父目录
              PARENT_DIR=$(dirname "$(dirname "$SRC_ROOT")")
              echo "✅ 源码根目录: $PARENT_DIR"

              # 验证是否包含 net/minecraft/client/MinecraftClient.java（映射后的源码）
              if [ -f "$PARENT_DIR/net/minecraft/client/MinecraftClient.java" ]; then
                echo "✅ 确认找到映射后的源码（MinecraftClient.java 存在）"
                cp -r "$PARENT_DIR" build/artifacts/mc_src
                echo "found_java=true" >> $GITHUB_OUTPUT
              else
                # 如果只有 .class 没有 .java，说明 Loom 没有反编译出源码，我们需要用 CFR 反编译
                echo "⚠️ 找到 .class 文件，但未找到对应的 .java 源码，尝试使用 CFR 反编译..."
                # 下载 CFR
                CFR_JAR="build/cfr.jar"
                if [ ! -f "$CFR_JAR" ]; then
                  wget -q -O "$CFR_JAR" "https://repo1.maven.org/maven2/org/benf/cfr/0.152/cfr-0.152.jar"
                fi
                # 反编译整个 jar（我们需要找到包含 MinecraftClient 的 jar）
                SOURCE_JAR=$(find ~/.gradle/caches -type f -name "minecraft-merged.jar" 2>/dev/null | head -1)
                if [ -n "$SOURCE_JAR" ] && [ -f "$SOURCE_JAR" ]; then
                  echo "🔧 使用 CFR 反编译 minecraft-merged.jar..."
                  java -jar "$CFR_JAR" "$SOURCE_JAR" --outputdir build/artifacts/mc_src
                  if [ -f "build/artifacts/mc_src/net/minecraft/client/MinecraftClient.java" ]; then
                    echo "🎉 CFR 反编译成功！"
                    echo "found_java=true" >> $GITHUB_OUTPUT
                  else
                    echo "❌ CFR 反编译后仍未找到 MinecraftClient.java"
                    echo "found_java=false" >> $GITHUB_OUTPUT
                  fi
                else
                  echo "❌ 未找到 minecraft-merged.jar，无法反编译"
                  echo "found_java=false" >> $GITHUB_OUTPUT
                fi
              fi
            else
              echo "❌ 无法从路径中提取源码根目录"
              echo "found_java=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ 未找到 MinecraftClient.class 或 class_310.class"
            echo "found_java=false" >> $GITHUB_OUTPUT
          fi

          # 如果找到源码，统计并输出
          if [ -d "build/artifacts/mc_src" ] && [ -f "build/artifacts/mc_src/net/minecraft/client/MinecraftClient.java" ]; then
            JAVA_COUNT=$(find build/artifacts/mc_src -name "*.java" 2>/dev/null | wc -l)
            echo "📊 源码包包含 $JAVA_COUNT 个 Java 文件"
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传映射后的源码（如果成功） ==========
      - name: 上传映射后的源码
        if: steps.locate_sources.outputs.found_java == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-unobfuscated
          path: build/artifacts/mc_src
          if-no-files-found: ignore
