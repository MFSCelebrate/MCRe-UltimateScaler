# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      # ========== 生成 Minecraft 源码 ==========
      - name: 生成 Minecraft 源码
        run: ./gradlew genSources

      # ========== 定位并提取源码 jar ==========
      - name: 提取源码 jar 并解压
        run: |
          echo "🔍 正在搜索 Minecraft 源码 jar..."
          SOURCE_JAR=$(find ~/.gradle/caches -name "minecraft-1.21.8-*-sources.jar" | head -n 1)
          echo "📍 找到的源码 jar: $SOURCE_JAR"
          
          if [ -f "$SOURCE_JAR" ]; then
            # 复制源码 jar 到 build/libs 下，作为备用
            cp "$SOURCE_JAR" build/libs/minecraft-1.21.8-sources.jar
            echo "✅ 源码 jar 已复制到 build/libs/minecraft-1.21.8-sources.jar"
            
            # 解压源码到 build/mc_src
            mkdir -p build/mc_src
            unzip -q "$SOURCE_JAR" -d build/mc_src
            echo "✅ 源码已解压到 build/mc_src"
            
            # 验证解压结果
            if [ -d "build/mc_src/net/minecraft" ]; then
              echo "✅ 验证通过：build/mc_src/net/minecraft 存在"
              ls -l build/mc_src/net/minecraft | head -20
            else
              echo "⚠️ 警告：未找到 net/minecraft 目录，解压可能不完整"
            fi
          else
            echo "❌ 错误：未找到源码 jar，genSources 可能失败"
            exit 1
          fi

      - name: 执行模组构建（不包含 Minecraft 类）
        run: ./gradlew build --no-daemon

      # ========== 上传产物 1：模组 Jar（干净） ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传产物 2：已解压的 Minecraft 源码（完整目录） ==========
      - name: 上传 Minecraft 源码（已解压，即开即看）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-1.21.8
          path: build/mc_src
          if-no-files-found: warn

      # ========== 额外：如果上面没传成功，把源码 jar 本身也传上去 ==========
      - name: 上传 Minecraft 源码 jar（备用）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-jar-1.21.8
          path: build/libs/minecraft-1.21.8-sources.jar
          if-no-files-found: warn
