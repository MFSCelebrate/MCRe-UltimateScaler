# .github/workflows/build.yml
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 生成 Minecraft 源码
        run: ./gradlew genSources --no-daemon

      # ========== 暴力探查 build 目录，定位反编译输出 ==========
      - name: 探测反编译输出目录
        id: probe
        run: |
          echo "📂 打印 build/ 目录结构（前 3 层）："
          find build -maxdepth 3 -type d 2>/dev/null || echo "build 目录不存在或为空"

          mkdir -p build/artifacts
          FOUND=false

          # 方法1：在 build 下直接查找包含 net/minecraft 的目录
          SRC_DIR=$(find build -type d -path "*/net/minecraft" 2>/dev/null | head -1)
          if [ -n "$SRC_DIR" ] && [ -d "$SRC_DIR" ]; then
            PARENT_DIR=$(dirname "$SRC_DIR")
            echo "✅ 通过搜索找到源码目录: $PARENT_DIR"
            cp -r "$PARENT_DIR" build/artifacts/mc_src
            FOUND=true
          fi

          # 方法2：如果找不到，尝试经典的 Loom 输出路径
          if [ "$FOUND" = false ]; then
            for dir in build/tmp/genSources build/genSources build/generated/sources build/.gen; do
              if [ -d "$dir" ] && [ -d "$dir/net/minecraft" ]; then
                echo "✅ 在预设目录找到源码: $dir"
                cp -r "$dir" build/artifacts/mc_src
                FOUND=true
                break
              fi
            done
          fi

          # 方法3：尝试解压缓存中的 merged-unpicked.jar（前提是非空）
          if [ "$FOUND" = false ]; then
            echo "⚠️ 未找到反编译源码，尝试从缓存提取 merged-unpicked.jar"
            SOURCE_JAR=$(find ~/.gradle/caches -type f -name "merged-unpicked.jar" 2>/dev/null | head -1)
            if [ -n "$SOURCE_JAR" ] && [ -f "$SOURCE_JAR" ] && [ -s "$SOURCE_JAR" ]; then
              mkdir -p build/artifacts/mc_src
              if unzip -q "$SOURCE_JAR" -d build/artifacts/mc_src 2>/dev/null; then
                echo "✅ 解压 merged-unpicked.jar 成功（可能包含 .class）"
                FOUND=true
              else
                echo "⚠️ 解压失败，文件可能损坏"
                rm -rf build/artifacts/mc_src
              fi
            else
              echo "⚠️ merged-unpicked.jar 不存在或为空"
            fi
          fi

          # 输出结果
          if [ "$FOUND" = true ]; then
            JAVA_COUNT=$(find build/artifacts/mc_src -name "*.java" 2>/dev/null | wc -l)
            CLASS_COUNT=$(find build/artifacts/mc_src -name "*.class" 2>/dev/null | wc -l)
            echo "🎉 成功获取源码！Java 文件数: $JAVA_COUNT, Class 文件数: $CLASS_COUNT"
            echo "found_java=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 所有方法均失败，跳过源码上传"
            echo "found_java=false" >> $GITHUB_OUTPUT
          fi

      # ========== 执行模组构建 ==========
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传源码（如果有） ==========
      - name: 上传 Minecraft 源码（若有）
        if: steps.probe.outputs.found_java == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources
          path: build/artifacts/mc_src
          if-no-files-found: ignore
