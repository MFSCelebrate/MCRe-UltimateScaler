# .github/workflows/build.yml
# Ultimate Scaler CI 构建流水线（含 Minecraft 源码反编译）
name: build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 校验 Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: 给 gradlew 加执行权限
        run: chmod +x ./gradlew

      - name: 生成 Minecraft 源码（下载字节码包）
        run: ./gradlew genSources

      # ============================================================
      # 核心改动：用 Vineflower 反编译 merged-unpicked.jar
      # ============================================================
      - name: 反编译 Minecraft 源码
        run: |
          set -e
          MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          echo "📌 Minecraft 版本: $MC_VERSION"

          mkdir -p build/mc_src build/all_jars

          # 1. 定位 merged-unpicked.jar
          SOURCE_JAR=$(find ~/.gradle/caches -type f -name "merged-unpicked.jar" | head -1)
          if [ -z "$SOURCE_JAR" ] || [ ! -f "$SOURCE_JAR" ]; then
            echo "❌ 未找到 merged-unpicked.jar，跳过反编译"
            exit 0
          fi
          echo "✅ 找到字节码包: $SOURCE_JAR"
          cp "$SOURCE_JAR" build/all_jars/merged-unpicked.jar

          # 2. 下载 Vineflower 反编译器（如果 Loom 没带，从 Maven 拉）
          VINEFLOWER_JAR="build/vineflower.jar"
          if [ ! -f "$VINEFLOWER_JAR" ]; then
            echo "📥 正在下载 Vineflower 反编译器..."
            wget -q -O "$VINEFLOWER_JAR" "https://repo1.maven.org/maven2/org/vineflower/vineflower/1.11.0/vineflower-1.11.0.jar"
          fi

          # 3. 执行反编译
          echo "🔧 开始反编译 merged-unpicked.jar 到 build/mc_src ..."
          java -jar "$VINEFLOWER_JAR" --output-dir build/mc_src "$SOURCE_JAR"

          # 4. 验证反编译结果
          JAVA_COUNT=$(find build/mc_src -name "*.java" | wc -l)
          CLASS_COUNT=$(find build/mc_src -name "*.class" | wc -l)
          echo "📊 反编译完成统计："
          echo "   Java 文件数 : $JAVA_COUNT"
          echo "   Class 文件数: $CLASS_COUNT"

          if [ "$JAVA_COUNT" -gt 0 ]; then
            echo "🎉 成功！反编译出纯 Java 源码，可直接阅读。"
          else
            echo "⚠️ 反编译未产生任何 Java 文件，请检查 Vineflower 版本或输入包。"
          fi

      # 执行模组构建
      - name: 执行模组构建
        run: ./gradlew build --no-daemon

      # ========== 上传产物 1：模组 Jar ==========
      - name: 上传模组构建产物
        uses: actions/upload-artifact@v4
        with:
          name: UltimateScaler-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      # ========== 上传产物 2：反编译后的 Java 源码 ==========
      - name: 上传 Minecraft 源码（反编译后，纯 Java）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-sources-${{ env.MC_VERSION }}
          path: build/mc_src
          if-no-files-found: ignore

      # ========== 上传产物 3：所有缓存 jar（备用） ==========
      - name: 上传 Minecraft 缓存 JAR 包（备用）
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-cache-all-jars
          path: build/all_jars/*.jar
          if-no-files-found: ignore
